<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落とし物管理（スタッフ専用）</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #222; margin: 0; padding: 0; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; background: #333; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        header { background-color: #d9534f; color: white; text-align: center; padding: 10px; font-weight: bold; border-radius: 5px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="password"], select, textarea { width: 100%; padding: 10px; border: 1px solid #555; background: #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #d9534f; color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        #admin-content { display: none; }
        .logout-btn { background: #555; font-size: 12px; padding: 5px 10px; width: auto; margin-bottom: 15px; }
        
        .section-title { border-bottom: 2px solid #d9534f; padding-bottom: 5px; margin-top: 30px; }
        .claim-card { background: #444; border: 1px solid #666; border-radius: 5px; padding: 15px; margin-bottom: 15px; }
        .claim-user { font-weight: bold; color: #5bc0de; }
        .claim-detail { background: #222; padding: 10px; border-radius: 5px; font-size: 13px; margin: 10px 0; white-space: pre-wrap; }
        .approve-btn { background-color: #06C755; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; width: auto; }
    </style>
</head>
<body>

<!-- 🔑 ログイン画面 -->
<div id="login-screen" class="container">
    <header>🛡️ スタッフ専用ログイン</header>
    <form id="login-form">
        <div class="form-group">
            <label>管理者用パスワード</label>
            <input type="password" id="login-pass" placeholder="パスワードを入力してください" required>
        </div>
        <button type="submit">ログイン</button>
    </form>
</div>

<!-- 🛡️ 管理者用メインコンテンツ -->
<div id="admin-content" class="container">
    <button class="logout-btn" onclick="logout()">ログアウト</button>
    <header>🛡️ 落とし物管理システム</header>
    
    <h3 class="section-title">新規落とし物登録</h3>
    <form id="register-form">
        <div class="form-group">
            <label>カテゴリ</label>
            <select id="reg-category" required>
                <option value="財布">財布</option>
                <option value="鍵">鍵・キーホルダー</option>
                <option value="スマホ">スマートフォン・ガジェット</option>
                <option value="衣類">衣類・傘・バッグ</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div class="form-group">
            <label>公開する特徴（例：黒い二つ折り財布）</label>
            <input type="text" id="reg-public-desc" required>
        </div>
        <div class="form-group">
            <label>拾得場所</label>
            <input type="text" id="reg-location" required>
        </div>
        <div class="form-group" style="background: #5c4815; padding: 10px; border-radius: 5px;">
            <label>🔒 隠す特徴（ブランド名、中身の金額など）</label>
            <textarea id="reg-secret-desc" required rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>写真</label>
            <input type="file" id="reg-file" accept="image/*" required>
        </div>
        <button type="submit" id="submit-btn">落とし物を登録する</button>
    </form>

    <h3 class="section-title">📩 届いた申請一覧</h3>
    <div id="claims-list">読み込み中...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔒【設定】スタッフ共通のパスワード
    const ADMIN_PASSWORD = "1234";

    const firebaseConfig = {
        apiKey: "AIzaSyAt0pdCitCLAApHouD5XBA47ubtUekTjMA",
        authDomain: "otoshimonocheck.firebaseapp.com",
        projectId: "otoshimonocheck",
        storageBucket: "otoshimonocheck.firebasestorage.app",
        messagingSenderId: "626224212883",
        appId: "1:626224212883:web:310b83089938d498edd666"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    if (sessionStorage.getItem("isAdminLoggedIn") === "true") {
        showAdmin();
    }

    document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const pass = document.getElementById("login-pass").value;
        if (pass === ADMIN_PASSWORD) {
            sessionStorage.setItem("isAdminLoggedIn", "true");
            showAdmin();
        } else {
            alert("パスワードが違います。");
        }
    });

    function showAdmin() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("admin-content").style.display = "block";
        loadClaims();
    }

    window.logout = function() {
        sessionStorage.removeItem("isAdminLoggedIn");
        location.reload();
    }

    // 届いた申請一覧の読み込み
    async function loadClaims() {
        const claimsDiv = document.getElementById("claims-list");
        try {
            const q = query(collection(db, "claims"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                claimsDiv.innerHTML = "<p style='color:#ccc;'>現在、新しい申請はありません。</p>";
                return;
            }

            let html = "";
            for (const claimDoc of querySnapshot.docs) {
                const claim = claimDoc.data();
                
                let itemDesc = "不明な落とし物";
                let secretDesc = "なし";
                if (claim.itemId) {
                    const itemSnap = await getDoc(doc(db, "items", claim.itemId));
                    if (itemSnap.exists()) {
                        itemDesc = itemSnap.data().publicDesc;
                        secretDesc = itemSnap.data().secretDesc;
                    }
                }

                const isProcessed = claim.status === "承認済み";

                html += `
                    <div class="claim-card">
                        <div class="claim-user">👤 申請者: ${claim.userName || '匿名'}</div>
                        <p style="margin:5px 0;font-size:13px;color:#aaa;">対象: [${itemDesc}]</p>
                        <p style="margin:5px 0;font-size:12px;color:#f0ad4e;">登録された隠す特徴: ${secretDesc}</p>
                        <div class="claim-detail">💬 ユーザーの回答:\n${claim.claimDetails}</div>
                        ${isProcessed 
                            ? "<p style='color:#5cb85c;font-weight:bold;margin:0;'>✅ LINE通知送信済み</p>" 
                            : `<button class="approve-btn" onclick="approveClaim('${claimDoc.id}', '${claim.userId}', '${itemDesc}')">LINEで一致を通知する</button>`
                        }
                    </div>
                `;
            }
            claimsDiv.innerHTML = html;
        } catch (error) {
            console.error(error);
            claimsDiv.innerHTML = "<p style='color:red;'>申請データの読み込みに失敗しました。</p>";
        }
    }

    // 申請承認処理
    window.approveClaim = async function(claimId, userId, itemDesc) {
        if (!confirm(`「${itemDesc}」の持ち主として承認し、LINE通知を送りますか？`)) return;

        try {
            await updateDoc(doc(db, "claims", claimId), { status: "承認済み" });
            alert("承認しました。LINE自動通知（GAS）の設定完了後にメッセージが送信されるようになります！");
            loadClaims();
        } catch (error) {
            alert("更新に失敗しました。");
        }
    }

    // 登録処理
    document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById("submit-btn");
        submitBtn.innerText = "登録中...";
        submitBtn.disabled = true;

        const category = document.getElementById("reg-category").value;
        const publicDesc = document.getElementById("reg-public-desc").value;
        const location = document.getElementById("reg-location").value;
        const secretDesc = document.getElementById("reg-secret-desc").value;
        const fileInput = document.getElementById("reg-file");

        let imageUrl = "";
        if (fileInput.files.length > 0) {
            imageUrl = await compressImage(fileInput.files[0]);
        }

        try {
            await addDoc(collection(db, "items"), {
                category,
                publicDesc,
                location,
                secretDesc,
                imageUrl,
                status: "保管中",
                createdAt: serverTimestamp()
            });
            alert("落とし物を登録しました！");
            document.getElementById("register-form").reset();
        } catch (error) {
            alert("登録失敗: " + error.message);
        } finally {
            submitBtn.innerText = "落とし物を登録する";
            submitBtn.disabled = false;
        }
    });

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400;
                    const MAX_HEIGHT = 400;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }
</script>
</body>
</html>
